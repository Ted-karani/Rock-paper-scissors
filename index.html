<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="start-screen"> 
    <h1>ROCK PAPER SCISSORS</h1>
    <p>click the button below if you dare to beat computer in this game:</p><br>
    <p>Good luck, you need it(if you win just  know i let you, you cant beat me)</p>
  <button onclick="startGame()" class="uiverse-btn"><span>PLAY NOW </span></button>
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTE8BCzDXLPb_r8g9s2u0mqm0TIM5P4pOu2Dg&s" alt="">
  <img src="https://img.freepik.com/free-photo/white-crumpled-paper-texture-background_1373-162.jpg" alt="">
  <img src="https://ih1.redbubble.net/image.761706292.5388/flat,750x,075,f-pad,750x1000,f8f8f8.jpg" alt="image">
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRgt7rFVN1qkBIVaZdOf4SzlzmWSrzb_54Lkg&s" alt="">
  
  
  <style> img{
    width: 300px;
    flex-wrap: wrap;
    justify-content: center;
  gap: 20px;
animation: float 3s ease-in-out infinite alternate;

  width: 30%;
  max-width: 200px;
  border-radius: 15px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  img:hover{
    transform: scale(1.1) rotate(3deg);
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  </style>
  

  </div>




  <div class="game-content" style="display: none;">
    <header>
    <h1>Rock Paper Scissors</h1>
    </header>
    <p> Think you can beat me, choose one below:</p>
    
    
    <div class="buttons">
      <button onclick="playGame('Rock')" class="button"><img src="rock-emoji.png" alt="" class="picture"></button>


    <button onclick="playGame('Paper')" class="button"> <img src="paper-image.jpg" alt="" class="picture"></button>


      <button onclick="playGame('Scissors')" class="button"><img src="scissors-image.png" alt="" class="picture"></button>

      <button onclick="resetScore()" class="button">Reset score</button>

    </div>
    <p class="js-score"></p>
    <p class="js-result"></p>
    <p class="js-moves"> </p>
    
  </div>
  
  
    
</body>
<script src="app.js"></script>
</html>
